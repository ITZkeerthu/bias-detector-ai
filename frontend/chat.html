<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Bias Firewall - Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body class="bg-navy-950 text-white antialiased h-screen flex flex-col overflow-hidden">

    <!-- NAVBAR -->
    <nav class="flex-shrink-0 h-14 border-b border-white/5 bg-navy-950/80 navbar-blur flex items-center justify-between px-4 z-40">
      <div class="flex items-center gap-3">
        <a href="/" class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-accent-blue to-accent-cyan flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
            </svg>
          </div>
          <span class="text-sm font-bold hidden sm:inline">AI Bias Firewall</span>
        </a>
        <!-- Model Selector -->
        <div class="relative">
          <select id="model-select" class="appearance-none bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-xs font-medium text-white/70 cursor-pointer hover:bg-white/10 transition-colors pr-7">
            <option value="gpt-4">GPT-4</option>
            <option value="claude-3">Claude 3</option>
            <option value="llama-3">Llama 3</option>
          </select>
          <svg class="w-3 h-3 text-white/40 absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <!-- Status -->
        <div id="status-indicator" class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-accent-green/10 border border-accent-green/20">
          <span class="w-1.5 h-1.5 rounded-full bg-accent-green status-live"></span>
          <span class="text-[10px] font-semibold text-accent-green">LIVE</span>
        </div>
        <a href="/dashboard.html" class="text-xs text-white/50 hover:text-white/80 transition-colors">Dashboard</a>
      </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
      <!-- SIDEBAR -->
      <aside id="sidebar" class="sidebar-transition w-64 flex-shrink-0 border-r border-white/5 bg-navy-950/50 flex flex-col overflow-hidden">
        <div class="p-3 flex items-center justify-between border-b border-white/5">
          <span class="text-xs font-semibold text-white/40 uppercase tracking-wider">Sessions</span>
          <button id="new-session-btn" class="w-6 h-6 rounded-md bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors">
            <svg class="w-3.5 h-3.5 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
          </button>
        </div>
        <div id="sessions-list" class="flex-1 overflow-y-auto p-2 space-y-1">
          <!-- Sessions populated by JS -->
        </div>
        <!-- Force Bias Toggle -->
        <div class="p-3 border-t border-white/5">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 rounded-full bg-accent-red"></div>
              <span class="text-xs font-medium text-white/60">Force Bias Mode</span>
            </div>
            <button id="force-bias-toggle" class="relative w-9 h-5 rounded-full bg-white/10 transition-colors" data-active="false">
              <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white/40 transition-all"></span>
            </button>
          </div>
          <p class="text-[10px] text-white/30 mt-1">Simulates biased AI responses</p>
        </div>
      </aside>

      <!-- Mobile sidebar toggle -->
      <button id="sidebar-toggle" class="fixed bottom-4 left-4 z-50 md:hidden w-10 h-10 rounded-xl glass-panel flex items-center justify-center">
        <svg class="w-5 h-5 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
      </button>

      <!-- MAIN CHAT AREA -->
      <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Messages -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">
          <!-- Welcome message -->
          <div class="flex justify-center py-8">
            <div class="text-center max-w-md">
              <div class="w-12 h-12 mx-auto mb-4 rounded-xl bg-gradient-to-br from-accent-blue to-accent-cyan flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" /></svg>
              </div>
              <h2 class="text-lg font-bold mb-2">AI Bias Firewall Chat</h2>
              <p class="text-sm text-white/40">Send a message to see real-time bias detection and correction in action.</p>
            </div>
          </div>
        </div>

        <!-- Input Bar -->
        <div class="flex-shrink-0 border-t border-white/5 p-4">
          <div class="max-w-3xl mx-auto">
            <form id="chat-form" class="flex items-end gap-2">
              <button type="button" id="upload-btn" class="flex-shrink-0 w-10 h-10 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 flex items-center justify-center transition-colors">
                <svg class="w-4 h-4 text-white/40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.12 2.12l7.81-7.81" /></svg>
              </button>
              <div class="flex-1 relative">
                <input id="chat-input" type="text" placeholder="Type a message..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-white/30 focus:outline-none focus:border-accent-blue/50 focus:ring-1 focus:ring-accent-blue/20 transition-all" autocomplete="off" />
              </div>
              <button type="submit" class="flex-shrink-0 w-10 h-10 rounded-xl bg-gradient-to-r from-accent-blue to-accent-cyan flex items-center justify-center hover:opacity-90 transition-all btn-glow">
                <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" /></svg>
              </button>
            </form>
          </div>
        </div>
      </main>
    </div>

    <!-- Bias Details Modal -->
    <div id="bias-modal" class="fixed inset-0 z-50 hidden">
      <div class="modal-overlay absolute inset-0" id="bias-modal-overlay"></div>
      <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-navy-900 border-l border-white/5 p-6 overflow-y-auto transform transition-transform duration-300 translate-x-full" id="bias-modal-content">
        <div class="flex items-center justify-between mb-6">
          <h3 class="text-base font-bold">Bias Details</h3>
          <button id="bias-modal-close" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors">
            <svg class="w-4 h-4 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>
        <div id="bias-modal-body">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <script type="module" src="/js/chat.js"></script>
  </body>
</html>
