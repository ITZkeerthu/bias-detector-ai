<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Bias Firewall — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body class="bg-navy-950 text-white antialiased min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
      <!-- Logo -->
      <div class="flex items-center justify-center gap-2.5 mb-8">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-accent-blue to-accent-cyan flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
          </svg>
        </div>
        <span class="text-xl font-bold">AI Bias Firewall</span>
      </div>

      <!-- Card -->
      <div class="glass-panel rounded-2xl p-8 border border-white/10">
        <div id="tab-header" class="flex rounded-xl bg-white/5 p-1 mb-6">
          <button id="tab-login" class="flex-1 py-2 text-sm font-medium rounded-lg bg-white/10 text-white transition-colors">Login</button>
          <button id="tab-signup" class="flex-1 py-2 text-sm font-medium rounded-lg text-white/50 hover:text-white/70 transition-colors">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-white/50 mb-1.5">Email</label>
            <input type="email" id="login-email" required autocomplete="email"
              class="w-full px-3 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm text-white placeholder-white/20 focus:outline-none focus:border-accent-blue/50 focus:bg-white/8 transition-colors"
              placeholder="you@example.com" />
          </div>
          <div>
            <label class="block text-xs font-medium text-white/50 mb-1.5">Password</label>
            <input type="password" id="login-password" required autocomplete="current-password"
              class="w-full px-3 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm text-white placeholder-white/20 focus:outline-none focus:border-accent-blue/50 focus:bg-white/8 transition-colors"
              placeholder="••••••••" />
          </div>
          <div id="login-error" class="hidden text-xs text-accent-red bg-accent-red/10 border border-accent-red/20 rounded-xl px-3 py-2"></div>
          <button type="submit" id="login-btn"
            class="w-full py-2.5 rounded-xl bg-gradient-to-r from-accent-blue to-accent-cyan text-sm font-semibold text-white hover:opacity-90 transition-all btn-glow flex items-center justify-center gap-2">
            <span>Login</span>
          </button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="space-y-4 hidden">
          <div>
            <label class="block text-xs font-medium text-white/50 mb-1.5">Email</label>
            <input type="email" id="signup-email" required autocomplete="email"
              class="w-full px-3 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm text-white placeholder-white/20 focus:outline-none focus:border-accent-blue/50 transition-colors"
              placeholder="you@example.com" />
          </div>
          <div>
            <label class="block text-xs font-medium text-white/50 mb-1.5">Password</label>
            <input type="password" id="signup-password" required autocomplete="new-password" minlength="8"
              class="w-full px-3 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm text-white placeholder-white/20 focus:outline-none focus:border-accent-blue/50 transition-colors"
              placeholder="Min. 8 characters" />
          </div>
          <div id="signup-error" class="hidden text-xs text-accent-red bg-accent-red/10 border border-accent-red/20 rounded-xl px-3 py-2"></div>
          <div id="signup-success" class="hidden text-xs text-accent-green bg-accent-green/10 border border-accent-green/20 rounded-xl px-3 py-2"></div>
          <button type="submit" id="signup-btn"
            class="w-full py-2.5 rounded-xl bg-gradient-to-r from-accent-blue to-accent-cyan text-sm font-semibold text-white hover:opacity-90 transition-all btn-glow">
            Create Account
          </button>
        </form>
      </div>

      <p class="text-center text-xs text-white/30 mt-4">
        <a href="/" class="hover:text-white/60 transition-colors">← Back to home</a>
      </p>
    </div>

    <script type="module" src="/js/login.js"></script>
  </body>
</html>
