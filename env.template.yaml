# This file defines the environment variables required for the application.
# For GCP Deployment (Cloud Run/GKE), these should be linked to Secret Manager.

env_variables:
  # Supabase Configuration
  SUPABASE_URL: "Required"
  SUPABASE_ANON_KEY: "Required"
  SUPABASE_SERVICE_ROLE_KEY: "Required"
  SUPABASE_JWT_SECRET: "Required"
  
  # Database
  DATABASE_URL: "Required"

  # LLM API Keys
  NVIDIA_API_KEY: "Required"
  GITHUB_API_KEY: "Required"
  GOOGLE_API_KEY: "Required"

  # Security
  ENCRYPTION_SECRET: "Required"

  # Service Coordination
  PORT: "3000"
  NODE_ENV: "production"
  BIAS_DETECTOR_URL: "http://localhost:5001" # Internal networking or Sidecar
  BIAS_THRESHOLD: "30"
  ALLOW_FORCE_BIAS: "true"
